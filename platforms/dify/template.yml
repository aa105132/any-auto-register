version: "0.6.0"
kind: "app"
app:
  name: "OpenAI Bridge"
  mode: "chat"
  icon: "\U0001F916"
  icon_type: "emoji"
  icon_background: "#FFEAD5"
  description: "Chat assistant with OpenAI-compatible API key. Use /v1/chat-messages with the generated API key."
  use_icon_as_answer_icon: false
model_config:
  opening_statement: null
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false
  speech_to_text:
    enabled: false
  text_to_speech:
    enabled: false
  retriever_resource:
    enabled: false
  annotation_reply:
    enabled: false
  more_like_this:
    enabled: false
  sensitive_word_avoidance:
    enabled: false
  external_data_tools: []
  model:
    provider: "openai"
    name: "gpt-4o-mini"
    mode: "chat"
    completion_params:
      temperature: 0.7
  user_input_form: []
  dataset_query_variable: null
  pre_prompt: "You are a helpful AI assistant."
  agent_mode:
    enabled: false
    strategy: null
    tools: []
    prompt: null
  prompt_type: "simple"
  chat_prompt_config: {}
  completion_prompt_config: {}
  dataset_configs:
    retrieval_model: "single"
  file_upload:
    image:
      enabled: false
      number_limits: 3
      detail: "high"
      transfer_methods:
        - "remote_url"
        - "local_file"
dependencies: []
